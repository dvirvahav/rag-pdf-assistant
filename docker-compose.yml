services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    env_file:
      - ./infrastructure/env/qdrant.env
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ragnet

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - ./infrastructure/env/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ./infrastructure/env/rabbitmq.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ragnet
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ragnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  file-service:
    build:
      context: .
      dockerfile: ./file-service/Dockerfile
    container_name: file-service
    ports:
      - "8000:8000"
    env_file:
      - ./infrastructure/env/file-service.env
    volumes:
      - shared_storage:/app/storage/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ragnet

  embedding-service:
    build:
      context: .
      dockerfile: ./embedding-service/Dockerfile
    container_name: embedding-service
    ports:
      - "8001:8001"
    env_file:
      - ./infrastructure/env/embedding-service.env
    volumes:
      - shared_storage:/app/storage/uploads
    depends_on:
      qdrant:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ragnet

  rag-service:
    build:
      context: .
      dockerfile: ./rag-service/Dockerfile
    container_name: rag-service
    ports:
      - "8002:8002"
    env_file:
      - ./infrastructure/env/rag-service.env
    depends_on:
      - qdrant
      - embedding-service
    networks:
      - ragnet

  audit-service:
    build:
      context: .
      dockerfile: ./audit-service/Dockerfile
    container_name: audit-service
    ports:
      - "8003:8003"
    env_file:
      - ./infrastructure/env/audit-service.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ragnet

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - file-service
    networks:
      - ragnet

networks:
  ragnet:

volumes:
  qdrant_data:
  shared_storage:
  postgres_data:
  rabbitmq_data:
  redis_data:
