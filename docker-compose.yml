services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    env_file:
      - ./infrastructure/env/qdrant.env
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ragnet

  file-service:
    build:
      context: ./file-service
    container_name: file-service
    ports:
      - "8000:8000"
    env_file:
      - ./infrastructure/env/file-service.env
    volumes:
      - shared_storage:/app/storage/uploads
    networks:
      - ragnet

  embedding-service:
    build:
      context: ./embedding-service
    container_name: embedding-service
    ports:
      - "8001:8001"
    env_file:
      - ./infrastructure/env/embedding-service.env
    volumes:
      - shared_storage:/app/storage/uploads
    depends_on:
      - qdrant
    networks:
      - ragnet

  rag-service:
    build:
      context: ./rag-service
    container_name: rag-service
    ports:
      - "8002:8002"
    env_file:
      - ./infrastructure/env/rag-service.env
    depends_on:
      - qdrant
      - embedding-service
    networks:
      - ragnet

networks:
  ragnet:

volumes:
  qdrant_data:
  shared_storage:
